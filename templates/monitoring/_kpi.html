<div style="background:white; border-radius:14px; border:1px solid #e2e8f0;
            box-shadow:0 1px 3px rgba(0,0,0,.05); padding:1.25rem 1.4rem;">
  <div style="display:flex; align-items:center; gap:.75rem;">
    <div style="width:42px; height:42px; border-radius:11px; display:flex; align-items:center;
                justify-content:center; font-size:1.1rem;
                background:{{ color }}1a; color:{{ color }};">
      <i class="{{ icon }}"></i>
    </div>
    <div>
      <div style="font-size:1.5rem; font-weight:800; color:#1e293b; line-height:1.1;">
        {{ value }}
      </div>
      <div style="font-size:.78rem; color:#94a3b8; font-weight:500; margin-top:.1rem;">
        {{ label }}
      </div>
    </div>
  </div>
</div>
